<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMACITY MUN • AIPPM Brief</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Georgia',serif;
    background:black;color:white;height:100vh;overflow:hidden;
}
body::before{
    content:"";position:fixed;inset:0;
    background:
    linear-gradient(to bottom,rgba(0,0,0,.85),rgba(0,0,0,.95)),
    url("https://t4.ftcdn.net/jpg/16/09/14/03/360_F_1609140310_Gk0htXMO6xx6k0mangckTUve7PKZwyUV.jpg")
    no-repeat center/cover;
    transform:scale(1.15);z-index:-1;
}
.header{
    position:fixed;top:0;width:100%;padding:18px 0;
    text-align:center;font-size:13px;letter-spacing:3px;opacity:.7;
}
.center{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);text-align:center;width:90%;max-width:420px;
}
.login-box{
    border:1px solid #888;padding:40px 30px;border-radius:8px;
    backdrop-filter:blur(10px);
}
input{
    padding:12px;width:100%;margin-top:18px;
    background:black;border:1px solid white;color:white;
    text-align:center;font-size:16px;border-radius:4px;
}
button{
    margin-top:25px;padding:12px 35px;background:transparent;
    border:1px solid white;color:white;cursor:pointer;
}
button:hover{background:white;color:black}

.brief{display:none}
.intro{font-size:28px;opacity:0;transition:1.5s;margin-bottom:30px}
.card{
    margin-top:40px;opacity:0;transition:1.5s;
    padding:25px;border:1px solid #888;border-radius:8px;
    backdrop-filter:blur(10px);
}
.highlight{color:#d4af37;font-weight:bold}
.fullscreen-btn{
    position:fixed;bottom:20px;right:20px;
    border:1px solid white;background:black;color:white;
    padding:8px 12px;cursor:pointer;
}
</style>
</head>

<body>

<div class="header">EMACITY MODEL UNITED NATIONS • AIPPM</div>

<div class="center">

<div id="login" class="login-box">
    <div>ENTER DELEGATE ID</div>
    <input type="text" id="idInput" placeholder="AIPPM101">
</div>

<div id="brief" class="brief">
    <div id="intro" class="intro">
        You are hereby summoned to the<br>
        <b>ALL INDIA POLITICAL PARTIES MEET</b>
    </div>

    <button onclick="startBriefing()">ENTER SESSION</button>

    <div id="card" class="card">
        <p>Delegate: <span id="dname" class="highlight"></span></p>
        <p>Affiliation: <span id="party" class="highlight"></span></p>
        <p>Portfolio: <span id="portfolio" class="highlight"></span></p>
    </div>
</div>

</div>

<audio id="gavelSound" src="gavel.mp3"></audio>
<audio id="voiceSound" src="voice.mp3"></audio>

<button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>

<script>

const delegates = {
"AIPPM101": { name:"Samruddhi Askar", party:"Indian National Congress", portfolio:"Dr. Shashi Tharoor" },
"AIPPM102": { name:"Bhagyashri Vikram Nagargoje", party:"Bharatiya Janata Party", portfolio:"Narendra Modi" },
"AIPPM103": { name:"Siddhesh Sachin Tiwari", party:"BJP", portfolio:"Amit Shah" },
"AIPPM104": { name:"Geet Valecha", party:"BJP", portfolio:"Nirmala Sitharaman" },
"AIPPM105": { name:"Putul Bafna", party:"INC", portfolio:"Rahul Gandhi" },
"AIPPM106": { name:"Shaurya Atkari", party:"Shiv Sena (UBT)", portfolio:"Uddhav Thackeray" },
"AIPPM107": { name:"Ayna Philip", party:"AAP", portfolio:"Raghav Chadha" },
"AIPPM108": { name:"Ayush Dinesh Wani", party:"BJP", portfolio:"Dr. S. Jaishankar" },
"AIPPM109": { name:"Shakalya Mishra", party:"INC", portfolio:"Dr. Subramanian Swamy" },
"AIPPM110": { name:"Avani Nachiket Agashe", party:"INC", portfolio:"P. Chidambaram" },
"AIPPM111": { name:"Tavish Bansal", party:"BJP", portfolio:"Rajnath Singh" },
"AIPPM112": { name:"Saharsh Bodana", party:"AAP", portfolio:"Arvind Kejriwal" },
"AIPPM113": { name:"Prisha", party:"TMC", portfolio:"Mamata Banerjee" },
"AIPPM114": { name:"Agastyaa Saurabh Soni", party:"BJP", portfolio:"Nitin Gadkari" },
"AIPPM115": { name:"Prabhjot Singh Nanda", party:"INC", portfolio:"Manish Tiwari" },
"AIPPM116": { name:"Siya Kamble", party:"INC", portfolio:"Sonia Gandhi" },
"AIPPM117": { name:"Vidit Tapadia", party:"Samajwadi Party", portfolio:"Akhilesh Yadav" },
"AIPPM118": { name:"Ritu", party:"BJP", portfolio:"Piyush Goyal" },
"AIPPM119": { name:"Mohrez Shaikh", party:"INC", portfolio:"Jairam Ramesh" },
"AIPPM120": { name:"Swarali Sandeep Dombale", party:"Shiv Sena", portfolio:"Eknath Shinde" },
"AIPPM121": { name:"Vidit Tapadia", party:"INC", portfolio:"Sachin Pilot" },
"AIPPM122": { name:"Siya Kamble", party:"INC", portfolio:"Digvijaya Singh" },
"AIPPM123": { name:"Harrish Aravind K", party:"AIMIM", portfolio:"Asaduddin Owaisi" },
"AIPPM124": { name:"Avanish Dnyandeo Jadhav", party:"BJP", portfolio:"Dharmendra Pradhan" },
"AIPPM125": { name:"Swarali Sandeep Dombale", party:"NCP", portfolio:"Sharad Pawar" },
"AIPPM126": { name:"Mahika Shukla", party:"INC", portfolio:"Mallikarjun Kharge" },
"AIPPM127": { name:"Saanvi Sharma", party:"BJP", portfolio:"Smriti Irani" },
"AIPPM128": { name:"Aditya Nanoti", party:"BJP", portfolio:"Manoj Tiwari" },

"RIS10": { name:"Rishabh Singh", party:"Executive Board", portfolio:"Chair • AIPPM" }
};

const input=document.getElementById("idInput");
input.focus();

input.addEventListener("keypress",e=>{
 if(e.key==="Enter") verify();
});

function verify(){
 let id=input.value.trim().toUpperCase();

 if(delegates[id]){
   let d=delegates[id];
   document.getElementById("dname").innerText=d.name;
   document.getElementById("party").innerText=d.party;
   document.getElementById("portfolio").innerText=d.portfolio;

   document.getElementById("login").style.display="none";
   document.getElementById("brief").style.display="block";
 }else{
   input.value="";
   input.placeholder="INVALID ID";
 }
}

function startBriefing(){
 document.getElementById("intro").style.opacity=1;
 setTimeout(()=>{
   document.getElementById("card").style.opacity=1;
 },4000);
}

function toggleFullscreen(){
 if(!document.fullscreenElement){
   document.documentElement.requestFullscreen();
 }else{
   document.exitFullscreen();
 }
}

</script>

</body>
</html>
